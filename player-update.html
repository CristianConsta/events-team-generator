<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://*.googleapis.com; img-src 'self' data:; font-src 'self' data:; base-uri 'none'; form-action 'self'; frame-src 'none';">
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="theme-variables.css">
    <link rel="stylesheet" href="player-update.css">
    <title>Update Your Stats</title>
</head>
<body>
    <script>
(function() {
    var theme = localStorage.getItem('ds_theme');
    if (theme && theme !== 'standard') {
        document.documentElement.setAttribute('data-theme', theme);
        document.body && document.body.setAttribute('data-theme', theme);
    }
})();
    </script>
    <div id="playerUpdateRoot" class="update-card-root">
        <div id="updateLoading" class="update-state-loading">
            <span data-i18n="player_update_loading">Loading...</span>
        </div>
        <div id="updateForm" class="update-state-form hidden">
            <h1 data-i18n="player_update_title">Update Your Stats</h1>
            <p id="updatePlayerName" class="update-player-name"></p>
            <form id="updateStatsForm" novalidate>
                <label for="updatePower" data-i18n="player_update_power_label">1st Team Power (M)</label>
                <p id="currentPowerValue" class="current-stat-value">Current value: &mdash;</p>
                <input type="number" id="updatePower" min="0" max="9999" step="0.01" required data-i18n-placeholder="player_update_power_placeholder" placeholder="e.g. 350">
                <span class="field-error" id="errorPower"></span>
                <label for="updateThp" data-i18n="player_update_thp_label">THP</label>
                <small class="field-note" data-i18n="player_update_thp_note">Note: THP (Total Hero Power - available in Rankings)</small>
                <p id="currentThpValue" class="current-stat-value">Current value: &mdash;</p>
                <input type="number" id="updateThp" min="0" max="99999" required data-i18n-placeholder="player_update_thp_placeholder" placeholder="e.g. 12000">
                <span class="field-error" id="errorThp"></span>
                <label for="updateTroops" data-i18n="player_update_troops_label">Troop Type</label>
                <select id="updateTroops" required>
                    <option value="" selected data-i18n="player_update_troops_placeholder">Select troop type</option>
                    <option value="Tank" data-i18n="troops_filter_tank">Tank</option>
                    <option value="Aero" data-i18n="troops_filter_aero">Aero</option>
                    <option value="Missile" data-i18n="troops_filter_missile">Missile</option>
                </select>
                <p id="currentTroopsValue" class="current-stat-value">Current value: &mdash;</p>
                <span class="field-error" id="errorTroops"></span>
                <button type="submit" data-i18n="player_update_submit_btn">Submit Update</button>
            </form>
        </div>
        <div id="updateSuccess" class="update-state-success hidden">
            <p data-i18n="player_update_success">Your stats have been submitted for review. Thank you!</p>
            <button id="updateDoneBtn" class="update-secondary-btn" data-i18n="player_update_done_btn">Done</button>
        </div>
        <div id="updateError" class="update-state-error hidden">
            <p id="updateErrorMessage"></p>
            <button id="updateRetryBtn" class="update-secondary-btn" data-i18n="player_update_retry_btn">Try Again</button>
        </div>
    </div>
    <script defer src="vendor/firebase-app-compat.js"></script>
    <script defer src="vendor/firebase-auth-compat.js"></script>
    <script defer src="vendor/firebase-firestore-compat.js"></script>
    <script defer src="firebase-config.js"></script>
    <script defer src="translations.js"></script>
    <script defer src="js/core/i18n.js"></script>
    <script defer src="js/player-update/player-update.js"></script>
</body>
</html>
