name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "**.js"
      - "**.mjs"
      - "**.html"
      - "**.css"
      - "package*.json"
      - "firestore.*"
      - ".github/workflows/**"
      - "playwright.config.*"
      - "eslint.config.*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: .eslintcache
          key: eslint-${{ hashFiles('eslint.config.*', '**/*.js') }}
          restore-keys: eslint-

      - name: Run lint
        run: npm run lint:ci

      - name: Check size budgets
        run: npm run check:budgets

      - name: Run unit tests
        run: npm run test:unit

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E smoke tests
        env:
          CI: "true"
          PLAYWRIGHT_CHANNEL: "chromium"
        run: npm run test:e2e:smoke

  package-and-deploy:
    needs: [lint-and-unit, e2e-smoke]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Create firebase-config.js from secret
        env:
          FIREBASE_CONFIG_JS: ${{ secrets.FIREBASE_CONFIG_JS }}
        run: |
          if [ -z "$FIREBASE_CONFIG_JS" ]; then
            echo "FIREBASE_CONFIG_JS secret not set" >&2
            exit 1
          fi
          printf "%s" "$FIREBASE_CONFIG_JS" > firebase-config.js

      - name: Stage deploy files
        run: |
          mkdir -p _site
          cp index.html player-update.html app.js firebase-module.js firebase-config.js translations.js styles.css player-update.css _site/
          cp -r js _site/js
          cp -r vendor _site/vendor
          cp -r dist _site/dist

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
